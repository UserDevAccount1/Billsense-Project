server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy GitNexus for same-origin iframe (enables DOM auto-fill)
    location /gitnexus-proxy/ {
        proxy_pass https://gitnexus.vercel.app/;
        proxy_set_header Host gitnexus.vercel.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # GitNexus assets — ^~ gives priority over regex locations
    # Try local admin panel assets first, fallback to GitNexus origin
    location ^~ /assets/ {
        try_files $uri @gitnexus_assets;
    }

    location @gitnexus_assets {
        proxy_pass https://gitnexus.vercel.app;
        proxy_set_header Host gitnexus.vercel.app;
        proxy_ssl_server_name on;
    }

    # Proxy dev server API (build/emulator control + APK download)
    # Dev server runs on host machine at port 3003
    location /api/dev/ {
        proxy_pass http://host.docker.internal:3003/api/dev/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy tree-sitter WASM files for GitNexus code parser
    location /wasm/ {
        proxy_pass https://gitnexus.vercel.app/wasm/;
        proxy_set_header Host gitnexus.vercel.app;
        proxy_ssl_server_name on;
    }
}
