version: "3.8"

services:
  billsense-api:
    image: asia-southeast2-docker.pkg.dev/bill-sense-aec6b/billsense/billsense-api:latest
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  admin-panel:
    build:
      context: ../admin-panel
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - billsense-api
    restart: unless-stopped
