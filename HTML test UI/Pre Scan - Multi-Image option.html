<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Multi-Image Scan</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 180px;
      background-color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      transition: width 0.3s;
    }

    .sidebar.collapsed {
      width: 60px;
    }

    .toggle-btn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px;
      margin-bottom: 20px;
      cursor: pointer;
      border-radius: 5px;
    }

    .sidebar-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      color: white;
      text-decoration: none;
      background-color: #007bff;
      border-radius: 5px;
      text-align: center;
      font-size: 14px;
      transition: 0.3s;
    }

    .sidebar.collapsed .sidebar-btn {
      font-size: 0;
      padding: 15px;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      padding: 10px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .camera-container {
      width: 90vw;
      height: 60vh;
      background: #000;
      border-radius: 15px;
      position: relative;
      overflow: hidden;
    }

    .rectangle-frame {
      position: absolute;
      top: 10%;
      left: 5%;
      width: 90%;
      height: 70%;
      border: 3px dashed rgba(255, 255, 255, 0.7);
      border-radius: 12px;
      pointer-events: none;
    }

    /* Overlay Guides */
    .overlay-guides {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .overlay-line {
      position: absolute;
      background: rgba(255, 255, 255, 0.3);
    }

    .overlay-line.horizontal {
      height: 1px;
      width: 90%;
      left: 5%;
    }

    .overlay-line.vertical {
      width: 1px;
      height: 70%;
      top: 10%;
    }

    .overlay-line.top {
      top: 30%;
    }

    .overlay-line.bottom {
      top: 60%;
    }

    .overlay-line.left {
      left: 30%;
    }

    .overlay-line.right {
      left: 70%;
    }

    /* Top Controls */
    .top-controls {
      position: absolute;
      top: 10px;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: center;
      color: white;
      font-size: 12px;
      z-index: 2;
    }

    .top-controls div {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Instruction Text */
    .instruction-text {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 3;
    }

    /* Bill Info */
    .bill-info {
      position: absolute;
      bottom: 15px;
      left: 10px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px;
      border-radius: 8px;
      font-size: 10px;
      width: 120px;
    }

    /* Scan Quality */
    .scan-quality {
      position: absolute;
      bottom: 15px;
      right: 10px;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px;
      border-radius: 8px;
      font-size: 10px;
      width: 120px;
    }

    /* Scan Button */
    .scan-btn {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 25px;
      font-size: 16px;
      color: white;
      background-color: #007bff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 3;
    }

    .scan-btn:hover {
      background-color: #0056b3;
    }

    /* Counter */
    .image-counter {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 8px;
      z-index: 3;
    }

    input[type=range] {
      width: 80px;
    }
  </style>
</head>
<body>

  <div class="sidebar" id="sidebar">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    <a href="./index.html" class="sidebar-btn">Previous Page</a>
    <a href="./during scanning info.html" class="sidebar-btn">Next Page</a>
  </div>

  <div class="main-content">
    <div class="camera-container">

      <div class="instruction-text">
        Take 3–5 pictures from different angles.
      </div>

      <div class="rectangle-frame"></div>

      <!-- Overlay Guides -->
      <div class="overlay-guides">
        <div class="overlay-line horizontal top"></div>
        <div class="overlay-line horizontal bottom"></div>
        <div class="overlay-line vertical left"></div>
        <div class="overlay-line vertical right"></div>
      </div>

      <div class="top-controls">
        <div>
          <label for="focusSlider">Focus:</label>
          <input type="range" id="focusSlider" min="1" max="100" value="50">
        </div>
        <div>
          <label for="flashToggle">Flash:</label>
          <input type="checkbox" id="flashToggle">
          <span id="flashStatus">Off</span>
        </div>
      </div>

      <div class="bill-info">
        <strong>Bill Info</strong><br>
        Currency: 500 PHP<br>
        Serial: ABC1234567
      </div>

      <div class="scan-quality">
        <strong>Scan Quality</strong><br>
        Lighting: Good<br>
        Focus: 90%
      </div>

      <div class="image-counter" id="imageCounter">
        0 of 5 captured
      </div>

      <button class="scan-btn" onclick="captureImage()">Capture</button>

    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    const flashToggle = document.getElementById("flashToggle");
    const flashStatus = document.getElementById("flashStatus");
    const imageCounter = document.getElementById("imageCounter");

    flashToggle.addEventListener("change", () => {
      flashStatus.textContent = flashToggle.checked ? "On" : "Off";
    });

    let imagesCaptured = 0;
    const maxImages = 5;

    function captureImage() {
      if (imagesCaptured < maxImages) {
        imagesCaptured++;
        imageCounter.textContent = `${imagesCaptured} of ${maxImages} captured`;
        alert(`Captured image ${imagesCaptured}`);
      } else {
        alert("You have already captured 5 images.");
      }
    }
  </script>

</body>
</html>
