<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
    }

    .scanner-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .video-feed {
      width: 70%;
      height: 50%;
      background: #000;
      position: relative;
      border: 5px solid #ddd;
      border-radius: 10px;
    }

    /* Confidence Bar */
    .confidence-bar-container {
      position: absolute;
      top: 10px;
      width: 70%;
      display: flex;
      justify-content: center;
      z-index: 10;
    }

    .confidence-bar {
      width: 100%;
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .confidence-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, red, yellow, green);
      transition: width 0.3s ease-in-out;
    }

    /* Currency Bill Info */
    .info-box {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      z-index: 10;
    }

    .info-box span {
      display: block;
      margin-bottom: 5px;
    }

    /* Feature Detection Overlay */
    .feature-overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 15px;
      border-radius: 10px;
      text-align: left;
      z-index: 10;
    }

    .feature-overlay span {
      display: block;
      margin-bottom: 5px;
    }

    /* Real-Time Confidence Score */
    .confidence-score {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      z-index: 10;
    }

    /* Scan Quality Indicators */
    .scan-quality {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 20px;
    }

    .quality-indicator {
      padding: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: 10px;
    }

    /* Alerts and Warnings */
    .alerts-container {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 0, 0, 0.8);
      color: white;
      border-radius: 10px;
      text-align: center;
      animation: bounce 1.5s infinite;
    }

    .error-messages {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 165, 0, 0.8);
      color: white;
      border-radius: 10px;
      text-align: center;
    }

    /* On-screen Alignment Assistance */
    .overlay-marker {
      border: 2px dashed red;
      width: 60%;
      height: 40%;
      position: absolute;
      top: 30%;
      left: 20%;
      pointer-events: none;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <div class="scanner-container">
    <!-- Confidence Bar -->
    <div class="confidence-bar-container">
      <div class="confidence-bar">
        <div class="confidence-bar-inner" id="confidence-bar" style="width: 0;"></div>
      </div>
    </div>

    <!-- Video Feed (Camera Simulation) -->
    <div class="video-feed" id="camera-feed">
      <div class="overlay-marker"></div>

      <!-- Currency Bill Information -->
<div class="info-box">
    <span id="currency-info">Currency: --</span>
    <span id="denomination-info">Denomination: --</span>
    <span id="validation-info">Validation: --</span>
  </div>

      <!-- Feature Detection Overlay -->
      <div class="feature-overlay">
        <span id="watermark">Watermark: --</span>
        <span id="hologram">Hologram: --</span>
        <span id="serial-number">Serial Number: --</span>
        <span id="uv-features">UV Features: --</span>
      </div>

      <!-- Real-Time Confidence Score -->
      <div class="confidence-score">
        Authenticity Confidence: <span id="confidence-percentage">85%</span>
        <div class="confidence-bar" style="width: 100%; background: linear-gradient(90deg, red, yellow, green); height: 5px; margin-top: 5px;">
          <div id="confidence-bar-inner" style="width: 85%; height: 100%; background: green;"></div>
        </div>
      </div>
    </div>

    <!-- Scan Quality Indicators -->
    <div class="scan-quality">
      <div class="quality-indicator" id="lighting-quality">Lighting: --</div>
      <div class="quality-indicator" id="focus-quality">Focus: --</div>
      <div class="quality-indicator" id="alignment-quality">Alignment: --</div>
    </div>

    <!-- Alerts and Warnings -->
    <div class="alerts-container" id="alerts-container">
      <span id="alert">Red Flag: --</span>
    </div>

    <div class="error-messages" id="error-messages">
      <span id="error">Error: --</span>
    </div>
  </div>

  <script>
    // Simulate real-time updates
    function updateConfidenceScore() {
      const confidence = Math.floor(Math.random() * 101);
      document.getElementById("confidence-bar").style.width = `${confidence}%`;
      document.getElementById("confidence-percentage").textContent = `${confidence}%`;
      document.getElementById("confidence-bar-inner").style.width = `${confidence}%`;
    }

    function updateScanQuality() {
      const lighting = ["Optimal", "Too Dark", "Too Bright"];
      const focus = `${Math.floor(Math.random() * 100)}%`;
      const alignment = ["Aligned", "Misaligned"];

      document.getElementById("lighting-quality").textContent = `Lighting: ${lighting[Math.floor(Math.random() * lighting.length)]}`;
      document.getElementById("focus-quality").textContent = `Focus: ${focus}`;
      document.getElementById("alignment-quality").textContent = `Alignment: ${alignment[Math.floor(Math.random() * alignment.length)]}`;
    }

    function updateAlerts() {
      const redFlags = [
        "Watermark Missing!",
        "Edge Mismatch!",
        "Color Inconsistency Detected!"
      ];
      document.getElementById("alert").textContent = `Red Flag: ${redFlags[Math.floor(Math.random() * redFlags.length)]}`;
    }

    function updateErrors() {
      const errors = [
        "Bill not fully visible. Please reposition.",
        "Scanning failed. Try again."
      ];
      document.getElementById("error").textContent = `Error: ${errors[Math.floor(Math.random() * errors.length)]}`;
    }

    function updateFeatureDetection() {
      const watermarkStatus = ["Detected", "Not Detected"];
      const hologramStatus = ["Visible", "Not Visible"];
      const uvStatus = ["Highlighted", "Not Highlighted"];
      const serialNumber = "ABC1234567";

      document.getElementById("watermark").textContent = `Watermark: ${watermarkStatus[Math.floor(Math.random() * watermarkStatus.length)]}`;
      document.getElementById("hologram").textContent = `Hologram: ${hologramStatus[Math.floor(Math.random() * hologramStatus.length)]}`;
      document.getElementById("serial-number").textContent = `Serial Number: ${serialNumber}`;
      document.getElementById("uv-features").textContent = `UV Features: ${uvStatus[Math.floor(Math.random() * uvStatus.length)]}`;
    }

    function updateBillInfo() {
  const currencies = ["PHP"];
  const denominations = ["500 ", "1000 ", "200 "];
  const currency = currencies[0]; // Only PHP
  const denomination = denominations[Math.floor(Math.random() * denominations.length)];

  document.getElementById("currency-info").textContent = `Currency: ${denomination} ${currency}`;
  document.getElementById("denomination-info").textContent = `Denomination: ${denomination}`;
  document.getElementById("validation-info").textContent = `Validation: Valid`;
}


    // Call update functions every interval
    setInterval(updateConfidenceScore, 2000);
    setInterval(updateScanQuality, 3000);
    setInterval(updateAlerts, 4000);
    setInterval(updateErrors, 5000);
    setInterval(updateFeatureDetection, 6000);
    setInterval(updateBillInfo, 7000);
  </script>
</body>
</html>


<style>
    /* Sidebar Styles */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100%;
      background-color: #333;
      display: flex;
      flex-direction: column;
      padding: 20px;
      transition: transform 0.3s ease; /* Smooth transition for sliding */
      transform: translateX(0); /* Sidebar visible by default */
    }

    .sidebar-btn {
      display: block;
      padding: 10px 15px;
      margin-bottom: 15px;
      color: white;
      text-decoration: none;
      background-color: #007bff;
      border-radius: 5px;
      text-align: center;
      font-size: 16px;
    }

    .sidebar-btn:hover {
      background-color: #0056b3;
    }

    /* Hidden sidebar (slide out to the left) */
    .sidebar.hidden {
      transform: translateX(-100%); /* Slide sidebar out of view */
    }

    /* Toggle Button Styles */
    .toggle-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 15px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background-color: #0056b3;
    }
  </style>


<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a href="./index.html" class="sidebar-btn">Previous Page</a>
    <a href="./Post Scan view.html" class="sidebar-btn">Next Page</a>
  </div>

  <!-- Toggle Button -->
  <button class="toggle-btn" id="toggle-btn">Toggle Sidebar</button>

  <!-- JavaScript -->
  <script>
    // Get elements
    const sidebar = document.getElementById("sidebar");
    const toggleBtn = document.getElementById("toggle-btn");

    // Toggle sidebar visibility on button click
    toggleBtn.addEventListener("click", function() {
      sidebar.classList.toggle("hidden");
    });
  </script>
