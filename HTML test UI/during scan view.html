<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>During Scan View</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="during-scan-container">
    <header>
      <h1>Scanning in Progress</h1>
    </header>
    <main>
      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress" id="progressBar" style="width: 0%;"></div>
        </div>
        <p class="progress-text" id="progressText">Scanning: 0% complete</p>
      </div>
      <div class="confidence-score">
        <h2>Confidence Score: <span id="confidenceScore">0%</span></h2>
      </div>
      <div class="detection-status">
        <h3>Detected Features:</h3>
        <ul id="detectionList">
          <li data-feature="watermark">Watermark: <span class="status-text">Pending...</span></li>
          <li data-feature="hologram">Hologram: <span class="status-text">Pending...</span></li>
          <li data-feature="serial-number">Serial Number: <span class="status-text">Pending...</span></li>
          <li data-feature="uv-marking">UV Marking: <span class="status-text">Pending...</span></li>
        </ul>
      </div>
      <button class="cancel-btn" id="cancelButton">Cancel Scan</button>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>

<style>
    body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background-color: #f9f9f9;
}

.during-scan-container {
  max-width: 600px;
  margin: 20px auto;
  padding: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

header h1 {
  text-align: center;
  color: #333;
  margin-bottom: 20px;
}

.progress-section {
  margin: 20px 0;
  text-align: center;
}

.progress-bar {
  width: 100%;
  height: 20px;
  background-color: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress {
  height: 100%;
  background-color: #007bff;
  transition: width 0.3s ease-in-out;
}

.progress-text {
  margin-top: 10px;
  font-size: 14px;
  color: #666;
}

.confidence-score {
  text-align: center;
  margin: 20px 0;
}

.confidence-score h2 {
  font-size: 18px;
  color: #333;
}

.detection-status {
  margin: 20px 0;
}

.detection-status h3 {
  font-size: 16px;
  color: #333;
  margin-bottom: 10px;
}

.detection-status ul {
  list-style: none;
  padding: 0;
}

.detection-status li {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #ddd;
  font-size: 14px;
}

.status-text {
  font-weight: bold;
}

.status-text.pending {
  color: #666;
}

.status-text.detected {
  color: #28a745;
}

.status-text.missing {
  color: #dc3545;
}

.cancel-btn {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  font-size: 16px;
  color: white;
  background-color: #dc3545;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.cancel-btn:hover {
  background-color: #c82333;
}

</style>
<script>
    let progress = 0;
let confidence = 0;

// Mock detected features
const features = [
  { feature: "watermark", status: "detected", delay: 2000 },
  { feature: "hologram", status: "detected", delay: 4000 },
  { feature: "serial-number", status: "detected", delay: 6000 },
  { feature: "uv-marking", status: "missing", delay: 8000 },
];

// Update progress and detection list
function updateScanProgress() {
  const progressBar = document.getElementById("progressBar");
  const progressText = document.getElementById("progressText");
  const confidenceScore = document.getElementById("confidenceScore");
  const detectionList = document.getElementById("detectionList");

  features.forEach((item, index) => {
    setTimeout(() => {
      const listItem = detectionList.querySelector(`[data-feature="${item.feature}"]`);
      const statusText = listItem.querySelector(".status-text");

      // Update feature status
      statusText.textContent = item.status === "detected" ? "Detected" : "Missing";
      statusText.className = `status-text ${item.status}`;

      // Update progress
      progress += 25; // Increase progress by 25% for each feature
      confidence += item.status === "detected" ? 25 : 0; // Increase confidence if detected

      progressBar.style.width = `${progress}%`;
      progressText.textContent = `Scanning: ${progress}% complete`;
      confidenceScore.textContent = `${confidence}%`;
    }, item.delay);
  });
}

// Cancel button functionality
document.getElementById("cancelButton").addEventListener("click", () => {
  alert("Scan canceled. Please restart.");
  location.reload(); // Reload to reset the scan
});

// Start the scan process on page load
window.onload = updateScanProgress;

</script>
