name: Fire APK (Firebase App Distribution)

# Build a BillSense APK and distribute it to the "testers" group via Firebase
# App Distribution — entirely in the cloud, no local dev-server / localhost needed.
# Run it from the GitHub UI: Actions -> "Fire APK ..." -> Run workflow (pick variant).

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Which app to build & distribute"
        type: choice
        options: [user, admin, both]
        default: user
      release_notes:
        description: "Release notes shown to testers"
        type: string
        default: "New BillSense test build"

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore gitignored config from secrets
        env:
          GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
          LP: ${{ secrets.LOCAL_PROPERTIES }}
          SA: ${{ secrets.FIREBASE_APP_DIST_SA }}
          SVC: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          printf '%s' "$GS" > BillSense/app/google-services.json
          printf '%s' "$LP" > BillSense/local.properties
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"
          mkdir -p BillSense/app/src/main/res/raw
          printf '%s' "$SVC" > BillSense/app/src/main/res/raw/service_account.json

      - name: Build APK(s)
        working-directory: BillSense
        env:
          VARIANT: ${{ github.event.inputs.variant }}
        run: |
          chmod +x ./gradlew
          case "$VARIANT" in
            user)  TASKS="assembleUserDebug" ;;
            admin) TASKS="assembleAdminDebug" ;;
            both)  TASKS="assembleUserDebug assembleAdminDebug" ;;
            *)     echo "Unknown variant: $VARIANT"; exit 1 ;;
          esac
          ./gradlew $TASKS --console=plain

      - name: Distribute via Firebase App Distribution
        env:
          VARIANT: ${{ github.event.inputs.variant }}
          NOTES: ${{ github.event.inputs.release_notes }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          npm install -g firebase-tools
          PROJECT=bill-sense-aec6b
          USER_APP=1:340624938055:android:81d528ded5f924a23fcd62
          ADMIN_APP=1:340624938055:android:ad1fd12436348f633fcd62
          PROXY=https://billsense.dev-environment.site
          # $1=apk  $2=firebaseAppId  $3=dashboardVariant(main|admin)  $4=packageName
          fire () {
            echo "Distributing $3 ($4)"
            OUT=$(firebase appdistribution:distribute "$1" --app "$2" --groups testers \
                    --project "$PROJECT" --release-notes "$NOTES" 2>&1) || { echo "$OUT"; exit 1; }
            echo "$OUT"
            # Parse the new release's tester link + version, then record it to RTDB
            # (apk_releases) so the LIVE APK Management page shows it automatically.
            URL=$(printf '%s' "$OUT" | grep -oE 'https://appdistribution\.firebase\.google\.com/testerapps/[^ ?]+' | head -1)
            VNUM=$(printf '%s' "$OUT" | grep -oiE 'release [0-9]+\.[0-9.]+' | grep -oE '[0-9]+\.[0-9.]+' | head -1)
            VCODE=$(printf '%s' "$OUT" | grep -oiE 'release [0-9.]+ \([0-9]+\)' | grep -oE '\([0-9]+\)' | tr -dc '0-9')
            SIZE=$(du -m "$1" | cut -f1)
            KEY="rel_${3}_${VCODE:-0}_$(date +%s)"
            JSON=$(jq -n --arg id "$KEY" --arg v "${VNUM:-?}" --argjson vc "${VCODE:-0}" \
              --arg var "$3" --arg date "$(date -u +%Y-%m-%dT%H:%M:%S)" --arg size "${SIZE} MB" \
              --arg pkg "$4" --arg url "$URL" --arg desc "$NOTES" \
              '{path:("apk_releases/"+$id),data:{id:$id,version:$v,versionCode:$vc,variant:$var,buildType:"debug",status:"testing",buildDate:$date,size:$size,minSdk:24,targetSdk:35,packageName:$pkg,distribution:"Firebase App Distribution",downloadUrl:$url,description:$desc}}')
            curl -sk -X POST "$PROXY/api/db/patch" -H 'Content-Type: application/json' -d "$JSON" \
              && echo "✔ Recorded $KEY to the live dashboard" \
              || echo "warn: could not record to dashboard (non-fatal) — distribution still succeeded"
          }
          if [ "$VARIANT" = "user" ] || [ "$VARIANT" = "both" ]; then
            fire "BillSense/app/build/outputs/apk/user/debug/app-user-debug.apk" "$USER_APP" "main" "com.app.billsense"
          fi
          if [ "$VARIANT" = "admin" ] || [ "$VARIANT" = "both" ]; then
            fire "BillSense/app/build/outputs/apk/admin/debug/app-admin-debug.apk" "$ADMIN_APP" "admin" "com.admin.billsense"
          fi

      - name: Summary
        if: always()
        run: echo "Variant=${{ github.event.inputs.variant }} -> testers group on bill-sense-aec6b. Check Firebase App Distribution console." >> "$GITHUB_STEP_SUMMARY"
