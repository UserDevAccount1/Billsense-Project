name: Deploy Admin Panel to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BillSense Admin/admin-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BillSense Admin/admin-panel/package-lock.json

      - name: Install
        run: npm ci

      - name: Inject env
        run: |
          {
            echo "VITE_GITNEXUS_REPO=${{ vars.VITE_GITNEXUS_REPO }}"
            echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}"
            echo "VITE_OPENAI_API_KEY=${{ secrets.VITE_OPENAI_API_KEY }}"
            echo "VITE_GITHUB_PAT=${{ secrets.VITE_GITHUB_PAT }}"
          } > .env.production

      - name: Build
        run: npm run build

      # No .htaccess needed: the Phusion Passenger Node app at the parent path
      # (app.js) serves /public via Node stdlib and handles SPA fallback +
      # cache headers itself. Apache mod_rewrite never sees these requests.

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          protocol: ftps
          port: 21
          local-dir: BillSense Admin/admin-panel/dist/
          server-dir: ${{ vars.CPANEL_REMOTE_DIR }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      - name: Summary
        run: |
          echo "### Deployed to cPanel" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ vars.CPANEL_REMOTE_DIR }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://billsense.dev-environment.site/" >> $GITHUB_STEP_SUMMARY
